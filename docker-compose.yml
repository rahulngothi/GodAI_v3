services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - MONGO_DB=dharma_ai
      - PYTHONUNBUFFERED=1
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    # faster-whisper (ctranslate2) needs ~700MB headroom even before the model loads.
    # Mongo WiredTiger is capped at 0.25GB so its 256m limit is sufficient.
    mem_limit: 1536m
    mem_reservation: 256m

  mongo:
    image: mongo:7
    # Cap WiredTiger cache so Mongo stays within its memory limit on the shared box.
    command: ["--wiredTigerCacheSizeGB", "0.25"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped
    mem_limit: 128m

volumes:
  mongo-data:
  caddy-data:
  caddy-config:
