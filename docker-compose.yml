services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - MONGO_DB=dharma_ai
      - PYTHONUNBUFFERED=1
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    # Safeguard: never starve the co-hosted trading bot.
    mem_limit: 512m
    mem_reservation: 128m

  mongo:
    image: mongo:7
    # Cap WiredTiger cache so Mongo stays within its memory limit on the shared box.
    command: ["--wiredTigerCacheSizeGB", "0.25"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped
    mem_limit: 128m

volumes:
  mongo-data:
  caddy-data:
  caddy-config:
