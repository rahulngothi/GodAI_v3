services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - MONGO_DB=dharma_ai
      - PYTHONUNBUFFERED=1
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mongo-data:
