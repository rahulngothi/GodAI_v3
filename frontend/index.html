<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#160f2e" />
  <title>Dharma AI — Talk to timeless wisdom</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- fixed background layers (z-index 0, pointer-events none) -->
  <div class="bg-aura"></div>
  <div class="bg-mandala"></div>

  <!-- full-screen modal overlays — outside layout flow, always on top -->

  <!-- Sign in / Sign up -->
  <div id="loginOverlay" class="login-overlay" hidden>
    <form id="loginForm" class="login-card" autocomplete="on">
      <div class="login-om">ॐ</div>
      <h1>Dharma AI</h1>
      <p class="login-sub">Sit with Krishna, Buddha, Vivekananda…<br/>and ask what weighs on your heart.</p>
      <div class="login-faces" id="loginFaces"></div>
      <input id="signupName" type="text" placeholder="Your name (optional)" autocomplete="name" class="signup-only" style="display:none" />
      <input id="loginUser" type="text" placeholder="Username" autocomplete="username" required />
      <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password" required />
      <input id="signupConfirm" type="password" placeholder="Confirm password" autocomplete="new-password" class="signup-only" style="display:none" />
      <button type="submit" class="login-btn" id="loginSubmit">Begin 🙏</button>
      <div id="loginError" class="login-error" hidden></div>
      <div class="login-toggle">
        <span id="toggleMsg">New here?</span>
        <button type="button" id="toggleAuth" class="link-btn">Create account</button>
      </div>
    </form>
  </div>

  <!-- Profile sheet -->
  <div id="profileOverlay" class="login-overlay" hidden>
    <div class="login-card profile-card">
      <div class="profile-head">
        <span class="profile-title">Your profile</span>
        <button type="button" id="profileClose" class="icon-chip" aria-label="Close">✕</button>
      </div>
      <label class="profile-label">Display name</label>
      <input id="profileName" type="text" placeholder="Your name" maxlength="80" />
      <label class="profile-label">Default language</label>
      <select id="profileLang" class="profile-select"></select>
      <label class="profile-label">Answer depth</label>
      <select id="profileStyle" class="profile-select">
        <option value="deep">Deep — full teachings</option>
        <option value="short">Short — concise replies</option>
        <option value="reflective">Reflective — questions back to me</option>
      </select>
      <button type="button" id="profileSave" class="login-btn" style="margin-top:6px">Save 🙏</button>
      <div id="profileStatus" class="login-error" style="color:#3f7d52" hidden></div>
    </div>
  </div>

  <!-- Speaking view -->
  <div id="speakOverlay" class="speak-overlay" hidden>
    <div class="speak-stage" id="speakStage">
      <div class="ring"></div><div class="ring r2"></div><div class="ring r3"></div>
      <div class="speak-face" id="speakFace"></div>
    </div>
    <div class="speak-name" id="speakName"></div>
    <div class="eq"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="speak-hint">tap anywhere to stop</div>
  </div>

  <!-- Conversation mode (voice dialogue) -->
  <div id="convoOverlay" class="convo-overlay" hidden>
    <button class="convo-close" id="convoClose" aria-label="Close">✕</button>
    <div class="speak-stage" id="convoStage">
      <div class="ring"></div><div class="ring r2"></div><div class="ring r3"></div>
      <div class="speak-face" id="convoFace"></div>
    </div>
    <div class="speak-name" id="convoName"></div>
    <div class="convo-status" id="convoStatus">tap the mic and speak</div>
    <div class="convo-text" id="convoText"></div>
    <button type="button" class="round-btn convo-mic" id="convoMic">🎙️</button>
  </div>

  <!-- Mobile sidebar backdrop -->
  <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>

  <!-- ════ Two-column layout: sidebar + app shell ════ -->
  <div id="layout">

    <aside id="drawer" aria-label="Conversations">
      <div class="drawer-header">
        <div class="drawer-brand">
          <span class="drawer-brand-om">ॐ</span>
          <span class="drawer-brand-name">Dharma AI</span>
        </div>
        <button id="sidebarToggle" class="icon-chip sidebar-toggle-btn" aria-label="Close sidebar" title="Close sidebar">✕</button>
      </div>
      <button id="newChatBtn" class="newchat-btn">＋ &nbsp;New conversation</button>
      <div id="drawerList" class="drawer-list" role="list"></div>
    </aside>

    <div id="app">
      <header class="topbar">
        <button id="histBtn" class="icon-chip" title="Conversations" aria-label="Open conversations">☰</button>
        <div class="brand">
          <span class="om">ॐ</span>
          <h1 class="title">Dharma AI</h1>
        </div>
        <div class="topbar-right">
          <select id="language" class="lang-select" aria-label="Language"></select>
          <button id="clearBtn" class="icon-chip" title="New conversation">↺</button>
          <button id="profileBtn" class="icon-chip" title="Profile" hidden>⚙</button>
          <button id="logoutBtn" class="icon-chip" title="Sign out" hidden>⎋</button>
          <button id="installBtn" class="install-btn" hidden>Install</button>
        </div>
      </header>

      <nav class="persona-rail" id="personas" aria-label="Choose your guide"></nav>

      <main class="chat" id="chat"></main>

      <form id="composer" class="composer" autocomplete="off">
        <button type="button" id="micBtn" class="round-btn mic" title="Speak" aria-label="Voice input">🎙️</button>
        <textarea id="input" rows="1" placeholder="Share what's on your mind…" maxlength="2000"></textarea>
        <button type="submit" id="sendBtn" class="round-btn send" title="Send" aria-label="Send">➤</button>
      </form>

      <nav class="bottomnav" id="modebar">
        <button class="nav-tab active" data-mode="converse"><span class="nav-ico">🪔</span><span>Guides</span></button>
        <button class="nav-tab" data-mode="perspectives"><span class="nav-ico">☸</span><span>Many Views</span></button>
        <button class="nav-tab" data-mode="daily"><span class="nav-ico">🌅</span><span>Today</span></button>
      </nav>
    </div>

  </div><!-- /#layout -->

  <script src="/avatars.js"></script>
  <script src="/app.js"></script>
</body>
</html>
